name: Verify training platform

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run verify:algoviz
      - run: npm run typecheck
      - run: npm test
      - run: npm run verify:runner
      - run: npm run build
